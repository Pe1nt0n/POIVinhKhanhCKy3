server {
    listen 80;
    server_name localhost;

    # Nén Gzip để tối ưu tốc độ load Frontend
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Phân phát nội dung Frontend (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Hỗ trợ React Router: Nếu không tìm thấy file, trả về index.html
        try_files $uri $uri/ /index.html;
    }

    # Bắt các request API và Reverse Proxy sang Backend (Docker Service name: backend)
    location /api/v1/ {
        proxy_pass http://backend:8080/api/v1/;
        proxy_http_version 1.1;
        
        # Cho phép các Header quan trọng đi qua
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Chuyển tiếp IP thật của client (quan trọng cho Rate Limiting bên backend)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bắt các request SignalR và Reverse Proxy sang Backend
    location /hubs/ {
        proxy_pass http://backend:8080/hubs/;
        proxy_http_version 1.1;
        
        # Bắt buộc để WebSockets hoạt động
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout cho WebSockets (tránh bị ngắt kết nối tự động quá sớm)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Chuyển tiếp truy cập file Media (hình ảnh, âm thanh) sang Backend
    location ^~ /media/ {
        proxy_pass http://backend:8080/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Cấu hình đặc biệt cho luồng SSE (Server-Sent Events) nếu có
    location /api/v1/audio/tasks/stream {
        proxy_pass http://backend:8080/api/v1/audio/tasks/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Cache Control cho file tĩnh
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
